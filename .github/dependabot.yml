version: 2
updates:
  # npm dependencies. Minor/patch bumps are grouped into one PR to cut noise;
  # major bumps come as their own PRs so they get a proper look.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in CI.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # The Docker base image.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
