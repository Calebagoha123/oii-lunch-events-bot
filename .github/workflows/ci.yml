name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # `npm ci` installs exactly the lockfile, including the correct
      # platform-specific sharp binary. This is what catches the "works on my
      # machine, sharp fails on a fresh checkout" class of breakage.
      - run: npm ci

      - run: npm test
